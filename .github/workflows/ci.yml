name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4

  security:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"
          bun-download-url: https://github.com/oven-sh/bun/releases/download/bun-v1.3.14/bun-linux-x64-baseline.zip
      - run: bun install --frozen-lockfile
      - run: bun run audit:js
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Linux ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
            rust_target: x86_64-unknown-linux-musl
            bun_target: bun-linux-x64-baseline
            bun_url: https://github.com/oven-sh/bun/releases/download/bun-v1.3.14/bun-linux-x64-baseline.zip
          - runner: ubuntu-24.04-arm
            arch: arm64
            rust_target: aarch64-unknown-linux-musl
            bun_target: bun-linux-arm64
            bun_url: https://github.com/oven-sh/bun/releases/download/bun-v1.3.14/bun-linux-aarch64.zip
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"
          bun-download-url: ${{ matrix.bun_url }}
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "1.97.0"
          components: rustfmt, clippy
          targets: ${{ matrix.rust_target }}
      - run: sudo apt-get update && sudo apt-get install -y build-essential musl-tools shellcheck strace
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run test
      - run: bun run build
      - name: Verify Linux tracing scenarios
        run: PATH="${PWD}/dist:${PATH}" ./demos/run-all.sh
      - run: ./scripts/verify-production-limits.sh
      - name: Verify clean release installation
        run: |
          version="v$(bun -p "require('./package.json').version")"
          cargo build --locked --release --target "${{ matrix.rust_target }}" -p trace-core
          bun build apps/cli/src/index.ts --compile --target="${{ matrix.bun_target }}" --outfile dist/tracewhy
          TRACEWHY_CORE_BINARY="${PWD}/target/${{ matrix.rust_target }}/release/tracewhy-trace-core" ./scripts/package-release.sh "${version}" "${{ matrix.arch }}"
          ./scripts/verify-release.sh "dist/tracewhy-linux-${{ matrix.arch }}.tar.gz"

  portable-analysis:
    name: Analysis ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            platform: macOS-arm64
          - runner: windows-2025
            platform: Windows-x64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "1.97.0"
      - run: bun install --frozen-lockfile
      - run: bun run check:ts
      - run: cargo test --locked --workspace
      - run: bun run test:cli
      - run: bun run build
      - run: bun run verify:portable
